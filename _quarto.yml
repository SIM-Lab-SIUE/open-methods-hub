project:
  type: website
  title: "MC Research Methods: Open Methods Hub"
  output-dir: docs
  render:
    - "*.qmd"
    - "modules/**/*.qmd"
    - "!modules/**/pokemon-practice.qmd"
    - "resources/*.qmd"
    - "workbook/*.qmd"
    - "chapters/*.qmd"
